<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Estudio · Gestión</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>

:root{
  --black:#000000;--noir:#0a0a0b;--coal:#141416;--smoke:#1d1d20;
  --rose:#ff004b;--rose2:#d10040;--rose-glow:rgba(255,0,75,0.15);--rose-dim:rgba(255,0,75,0.08);
  --white:#f7f5f2;--ash:#8a8790;--ash2:#5a575f;--line:rgba(255,255,255,0.08);--line2:rgba(255,255,255,0.04);
  --green:#3ddc84;--amber:#ffb13d;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{font-family:'Jost',sans-serif;background:var(--black);color:var(--white);-webkit-font-smoothing:antialiased;overflow-x:hidden;width:100%;max-width:100vw;}
html{overflow-x:hidden;}
input,select,textarea{max-width:100%;}
.serif{font-family:'Cormorant Garamond',serif;}

.screen{display:none;min-height:100vh;}
.screen.active{display:block;}

/* LOGIN */
#loginScreen{display:none;min-height:100vh;background:var(--black);flex-direction:column;align-items:center;justify-content:center;padding:32px;position:relative;overflow:hidden;}
#loginScreen.active{display:flex;}
#loginScreen::before{content:'';position:absolute;top:-30%;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,var(--rose-glow) 0%,transparent 60%);pointer-events:none;}
.login-box{width:100%;max-width:340px;position:relative;z-index:2;text-align:center;}
.login-logo{width:160px;height:auto;margin:0 auto 38px;display:block;filter:drop-shadow(0 0 35px rgba(255,0,75,0.28));}
.login-title{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:30px;line-height:1.1;margin-bottom:10px;letter-spacing:0.01em;}
.login-sub{font-size:13px;color:var(--ash);margin-bottom:36px;line-height:1.6;font-weight:300;}
.lfield{margin-bottom:14px;text-align:left;}
.llabel{display:block;font-size:10px;letter-spacing:0.25em;text-transform:uppercase;color:var(--ash2);margin-bottom:8px;font-weight:500;}
.linput{width:100%;background:rgba(255,255,255,0.03);border:1px solid var(--line);color:var(--white);font-family:'Jost',sans-serif;font-size:16px;padding:15px 16px;border-radius:3px;outline:none;transition:all 0.25s;}
.linput:focus{border-color:var(--rose);background:rgba(255,0,75,0.04);}
.linput::placeholder{color:var(--ash2);}
.lbtn{width:100%;background:var(--rose);color:#fff;border:none;font-family:'Jost',sans-serif;font-weight:600;font-size:13px;letter-spacing:0.15em;text-transform:uppercase;padding:16px;border-radius:3px;cursor:pointer;margin-top:10px;transition:all 0.25s;position:relative;overflow:hidden;}
.lbtn:active{background:var(--rose2);transform:scale(0.99);}
.lbtn:disabled{opacity:0.4;cursor:not-allowed;}
.lerr{font-size:13px;color:var(--rose);margin-top:14px;line-height:1.5;display:none;}
.ltoggle{margin-top:28px;font-size:13px;color:var(--ash);font-weight:300;}
.ltoggle a{color:var(--white);text-decoration:none;border-bottom:1px solid var(--rose);cursor:pointer;padding-bottom:1px;}

/* TOPBAR */
.topbar{background:var(--noir);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:100;}
.topbar-inner{padding:env(safe-area-inset-top,0) 16px 0;display:flex;align-items:center;justify-content:space-between;height:66px;gap:8px;}
.tb-brand{display:flex;align-items:center;gap:10px;min-width:0;flex-shrink:1;}
.tb-logo{height:34px;width:auto;filter:drop-shadow(0 0 12px rgba(255,0,75,0.3));}
.tb-name{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;letter-spacing:0.02em;line-height:1;white-space:nowrap;}
.tb-user{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.tb-uname{font-size:11px;color:var(--ash);font-weight:300;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px;}
.tb-role{font-size:8px;letter-spacing:0.1em;text-transform:uppercase;background:var(--rose);color:#fff;padding:4px 7px;border-radius:2px;font-weight:600;white-space:nowrap;}
.tb-role.tatuadora{background:var(--smoke);color:var(--ash);}
.tb-out{background:none;border:1px solid var(--line);color:var(--ash);font-size:8px;letter-spacing:0.08em;text-transform:uppercase;padding:6px 9px;border-radius:2px;cursor:pointer;font-weight:500;transition:all 0.2s;white-space:nowrap;flex-shrink:0;}
.tb-out:active{border-color:var(--rose);color:var(--rose);}

/* TABS */
.tabs{background:var(--noir);display:flex;padding:0 14px;gap:4px;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;background:none;border:none;color:var(--ash2);font-family:'Jost',sans-serif;font-weight:500;font-size:12px;letter-spacing:0.04em;text-transform:uppercase;padding:15px 12px;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.25s;white-space:nowrap;}
.tab.active{color:var(--white);border-bottom-color:var(--rose);}

/* CONTENT */
.content{padding:24px 20px;max-width:840px;margin:0 auto;padding-bottom:110px;width:100%;box-sizing:border-box;overflow-x:hidden;}
.page{display:none;}
.page.active{display:block;animation:fade 0.4s cubic-bezier(0.16,1,0.3,1);}
@keyframes fade{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* SECTION HEADER */
.shead{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:24px;}
.shead-l .eyebrow{font-size:10px;letter-spacing:0.25em;text-transform:uppercase;color:var(--rose);margin-bottom:7px;font-weight:500;}
.shead-l h1{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:38px;line-height:0.95;letter-spacing:-0.01em;}
.shead-r{font-size:11px;color:var(--ash2);text-align:right;letter-spacing:0.05em;line-height:1.5;}

/* STAT CARDS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:28px;width:100%;}
.scard{background:var(--coal);border:1px solid var(--line);padding:18px;border-radius:4px;position:relative;overflow:hidden;}
.scard.feature{border-color:var(--rose);background:linear-gradient(135deg,var(--coal),rgba(255,0,75,0.04));}
.scard .lbl{font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ash2);margin-bottom:10px;font-weight:500;}
.scard .val{font-family:'Jost',sans-serif;font-weight:600;font-size:26px;line-height:1;letter-spacing:-0.01em;}
.scard .val.accent{color:var(--rose);}
.scard .sub{font-size:11px;color:var(--ash2);margin-top:6px;font-weight:300;}

/* BUTTONS */
.btn{background:var(--white);color:var(--black);border:none;font-family:'Jost',sans-serif;font-weight:600;font-size:13px;letter-spacing:0.02em;padding:13px 20px;border-radius:3px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:all 0.2s;}
.btn:active{transform:scale(0.98);}
.btn.accent{background:var(--rose);color:#fff;}
.btn.ghost{background:none;border:1px solid var(--line);color:var(--white);}
.btn.ghost:active{border-color:var(--rose);}
.btn.sm{padding:9px 14px;font-size:12px;}
.btn-add{width:100%;background:rgba(255,0,75,0.05);border:1px solid var(--line);color:var(--white);font-family:'Jost',sans-serif;font-weight:500;font-size:13px;letter-spacing:0.03em;padding:16px;border-radius:3px;cursor:pointer;margin-bottom:22px;transition:all 0.25s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-add:active{border-color:var(--rose);background:var(--rose-dim);}
.btn-add .plus{color:var(--rose);font-size:16px;}

/* LIST */
.wlist{display:flex;flex-direction:column;gap:10px;}
.wrow{background:var(--coal);border:1px solid var(--line);padding:18px;border-radius:4px;cursor:pointer;transition:all 0.2s;}
.wrow:active{border-color:var(--rose);}
.wrow-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px;}
.wrow-client{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:21px;line-height:1;}
.wrow-date{font-size:10px;color:var(--ash2);white-space:nowrap;letter-spacing:0.05em;margin-top:4px;}
.wrow-nums{display:flex;gap:22px;flex-wrap:wrap;align-items:flex-end;}
.wnum{display:flex;flex-direction:column;gap:3px;}
.wnum .k{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ash2);font-weight:500;}
.wnum .v{font-weight:500;font-size:16px;}
.wnum .v.accent{color:var(--rose);}
.vbadge{font-size:9px;letter-spacing:0.06em;text-transform:uppercase;padding:4px 9px;border-radius:2px;font-weight:600;}
.vbadge.pendiente{background:var(--smoke);color:var(--ash);}
.vbadge.validado{background:rgba(61,220,132,0.12);color:var(--green);}
.vbadge.discrepancia{background:var(--rose-glow);color:var(--rose);}
.ttag{font-size:9px;letter-spacing:0.06em;text-transform:uppercase;color:var(--ash);background:var(--smoke);padding:4px 9px;border-radius:2px;font-weight:500;}

/* EMPTY */
.empty{text-align:center;padding:64px 20px;}
.empty-mark{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:24px;margin-bottom:10px;}
.empty-sub{font-size:13px;color:var(--ash2);line-height:1.6;font-weight:300;max-width:280px;margin:0 auto;}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;align-items:flex-end;backdrop-filter:blur(6px);}
.overlay.open{display:flex;}
.sheet{background:var(--noir);width:100%;max-height:92vh;overflow-y:auto;border-radius:14px 14px 0 0;border-top:1px solid var(--line);animation:up 0.35s cubic-bezier(0.16,1,0.3,1);}
@keyframes up{from{transform:translateY(100%);}to{transform:translateY(0);}}
.sheet-head{position:sticky;top:0;background:var(--noir);border-bottom:1px solid var(--line);padding:20px;display:flex;align-items:center;justify-content:space-between;z-index:2;}
.sheet-head h2{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:25px;}
.sheet-close{background:none;border:none;color:var(--ash);font-size:26px;cursor:pointer;line-height:1;width:32px;height:32px;}
.sheet-body{padding:20px;overflow-x:hidden;}

/* FORM */
.fgroup{margin-bottom:18px;}
.flabel{display:block;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ash2);margin-bottom:8px;font-weight:500;}
.finput,.fselect{width:100%;background:var(--coal);border:1px solid var(--line);color:var(--white);font-family:'Jost',sans-serif;font-size:16px;padding:14px;border-radius:3px;outline:none;transition:all 0.2s;}
.finput:focus,.fselect:focus{border-color:var(--rose);}
.finput::placeholder{color:var(--ash2);}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;}
.frow .fgroup{min-width:0;}
.finput,.fselect{max-width:100%;}
.calc-box{background:linear-gradient(135deg,var(--coal),rgba(255,0,75,0.05));border:1px solid var(--rose);padding:18px;border-radius:4px;margin:18px 0;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;}
.calc-box .k{font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ash2);margin-bottom:4px;font-weight:500;}
.calc-box .split{display:flex;gap:24px;}
.calc-box .v{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:26px;line-height:1;}
.calc-box .v.accent{color:var(--rose);}
.dval{font-weight:500;font-size:16px;}
.dval.big{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;}

/* VALIDATION */
.vctrl{display:flex;gap:8px;}
.vbtn{flex:1;padding:11px 6px;border:1px solid var(--line);background:var(--coal);color:var(--white);font-family:'Jost',sans-serif;font-weight:500;font-size:12px;border-radius:3px;cursor:pointer;transition:all 0.2s;}
.vbtn.active.val{background:var(--green);color:#000;border-color:var(--green);}
.vbtn.active.dis{background:var(--rose);color:#fff;border-color:var(--rose);}
.vbtn.active.pen{background:var(--smoke);color:var(--white);border-color:var(--ash2);}

/* INVOICE */
.invrow{background:var(--coal);border:1px solid var(--line);padding:18px;border-radius:4px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:12px;cursor:pointer;transition:all 0.2s;}
.invrow:active{border-color:var(--rose);}
.invrow-l .num{font-size:13px;font-weight:600;letter-spacing:0.03em;}
.invrow-l .name{font-size:12px;color:var(--ash2);margin-top:4px;font-weight:300;}
.invrow-r{text-align:right;}
.invrow-r .total{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:22px;}
.invrow-r .date{font-size:10px;color:var(--ash2);margin-top:2px;}

/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(120px);background:var(--white);color:var(--black);padding:14px 24px;border-radius:4px;font-size:14px;font-weight:500;z-index:999;transition:transform 0.4s cubic-bezier(0.16,1,0.3,1);box-shadow:0 10px 40px rgba(0,0,0,0.5);}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.err{background:var(--rose);color:#fff;}

.loader{text-align:center;padding:56px;font-size:11px;color:var(--ash2);letter-spacing:0.2em;text-transform:uppercase;}

.muted{color:var(--ash2);}
.hidden{display:none!important;}

</style>
</head>

const sb=window.supabase.createClient(SB_URL,SB_KEY);

// ===== AUTH =====
let authMode='login';
function toggleMode(){
  authMode=authMode==='login'?'signup':'login';
  document.getElementById('loginTitle').textContent=authMode==='login'?'Bienvenida a Davink':'Crear cuenta';
  document.getElementById('loginSub').textContent=authMode==='login'?'Introduce tus datos para entrar a tu panel.':'Regístrate para acceder al sistema del estudio.';
  document.getElementById('loginBtn').textContent=authMode==='login'?'Entrar':'Crear cuenta';
  document.getElementById('nameField').classList.toggle('hidden',authMode==='login');
  document.getElementById('toggleAuth').innerHTML=authMode==='login'?'¿Primera vez? <a onclick="toggleMode()">Crear cuenta</a>':'¿Ya tienes cuenta? <a onclick="toggleMode()">Entrar</a>';
  document.getElementById('loginErr').style.display='none';
}

async function doAuth(){
  const email=document.getElementById('email').value.trim();
  const password=document.getElementById('password').value;
  const btn=document.getElementById('loginBtn');
  const err=document.getElementById('loginErr');
  err.style.display='none';
  if(!email||!password){err.textContent='Completa correo y contraseña.';err.style.display='block';return;}
  btn.disabled=true;btn.textContent=authMode==='login'?'Entrando...':'Creando...';
  try{
    if(authMode==='signup'){
      const fullname=document.getElementById('fullname').value.trim();
      if(!fullname){err.textContent='Introduce tu nombre completo.';err.style.display='block';btn.disabled=false;btn.textContent='Crear cuenta';return;}
      const{data,error}=await sb.auth.signUp({email,password,options:{data:{nombre_completo:fullname,rol:'tatuadora'}}});
      if(error)throw error;
      if(data.user&&!data.session){err.style.color='#2d7d4a';err.textContent='Cuenta creada. Ya puedes entrar.';err.style.display='block';toggleMode();btn.disabled=false;return;}
    }else{
      const{error}=await sb.auth.signInWithPassword({email,password});
      if(error)throw error;
    }
    await loadSession();
  }catch(e){
    err.style.color='';
    err.textContent=traducirError(e.message);
    err.style.display='block';
  }finally{
    // SIEMPRE resetear el botón al terminar, haya éxito o error
    btn.disabled=false;
    btn.textContent=authMode==='login'?'Entrar':'Crear cuenta';
  }
}

function traducirError(msg){
  if(msg.includes('Invalid login'))return 'Correo o contraseña incorrectos.';
  if(msg.includes('already registered'))return 'Este correo ya está registrado.';
  if(msg.includes('at least 6'))return 'La contraseña debe tener al menos 6 caracteres.';
  if(msg.includes('valid email'))return 'Introduce un correo válido.';
  return msg;
}

async function doLogout(){
  await sb.auth.signOut();
  currentUser=null;currentProfile=null;isAdmin=false;isRecepcion=false;
  document.getElementById('appScreen').classList.remove('active');
  document.getElementById('loginScreen').classList.add('active');
  document.getElementById('email').value='';
  document.getElementById('password').value='';
  // Resetear el botón de entrar por si quedó bloqueado
  resetLoginBtn();
}
function resetLoginBtn(){
  const btn=document.getElementById('loginBtn');
  if(btn){btn.disabled=false;btn.textContent=authMode==='login'?'Entrar':'Crear cuenta';}
  const err=document.getElementById('loginErr');
  if(err)err.style.display='none';
}

async function loadSession(){
  const{data:{session}}=await sb.auth.getSession();
  if(!session){
    document.getElementById('loginScreen').classList.add('active');
    document.getElementById('appScreen').classList.remove('active');
    resetLoginBtn();
    return;
  }
  currentUser=session.user;
  // Cargar perfil
  const{data:profile,error}=await sb.from('perfiles').select('*').eq('id',currentUser.id).single();
  if(error||!profile){
    showToast('Error cargando perfil','err');
    return;
  }
  currentProfile=profile;
  isAdmin=profile.rol==='admin';
  isRecepcion=profile.rol==='recepcion';
  document.getElementById('loginScreen').classList.remove('active');
  document.getElementById('appScreen').classList.add('active');
  // nombre de usuario ya no se muestra en topbar
  const roleEl=document.getElementById('userRole');
  roleEl.textContent=isAdmin?'Admin':(isRecepcion?'Recepción':'Tatuadora');
  roleEl.className='tb-role'+(isAdmin?'':' tatuadora');
  if(isAdmin||isRecepcion){await loadTatuadoras();}
  buildTabs();
  switchPage(isAdmin?'resumen':(isRecepcion?'trabajos':'mis-trabajos'));
}

async function loadTatuadoras(){
  const{data}=await sb.from('perfiles').select('*').order('nombre_completo');
  allTatuadoras=data||[];
}

// ===== TABS =====
function buildTabs(){
  let tabs;
  if(isAdmin){
    tabs=[['resumen','Resumen'],['trabajos','Trabajos'],['facturas','Facturas'],['gastos','Gastos'],['equipo','Equipo']];
  }else if(isRecepcion){
    // Recepción: trabajos de todas y equipo, SIN resumen/facturas/gastos
    tabs=[['trabajos','Trabajos'],['equipo','Equipo'],['mi-perfil','Mi perfil']];
  }else{
    tabs=[['mis-trabajos','Mis trabajos'],['mi-perfil','Mi perfil']];
  }
  const el=document.getElementById('tabs');
  el.innerHTML=tabs.map(([id,label])=>`<button class="tab" data-page="${id}" onclick="switchPage('${id}')">${label}</button>`).join('');
}

let currentPage='';
function switchPage(page){
  currentPage=page;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.page===page));
  const c=document.getElementById('pageContent');
  c.innerHTML='<div class="loader">Cargando...</div>';
  if(page==='resumen')renderResumen(c);
  else if(page==='trabajos')renderTrabajos(c,true);
  else if(page==='mis-trabajos')renderTrabajos(c,false);
  else if(page==='facturas')renderFacturas(c);
  else if(page==='gastos')renderGastos(c);
  else if(page==='equipo')renderEquipo(c);
  else if(page==='mi-perfil')renderMiPerfil(c);
}

function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast show'+(type==='err'?' err':'');
  setTimeout(()=>t.className='toast',2800);
}

function eur(n){return Number(n||0).toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';}
function fecha(d){return new Date(d).toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'});}

// ===== HELPERS DE FECHA Y FILTROS =====
let filtroAnio=new Date().getFullYear();
let filtroMes=new Date().getMonth(); // 0-11, o -1 para todo el año
let filtroTrimestre=0; // 0=ninguno, 1-4

const MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const MESES_CORTO=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

function enPeriodo(fechaStr,anio,mes){
  const d=new Date(fechaStr);
  if(d.getFullYear()!==anio)return false;
  if(mes>=0&&d.getMonth()!==mes)return false;
  return true;
}
function enTrimestre(fechaStr,anio,trim){
  const d=new Date(fechaStr);
  if(d.getFullYear()!==anio)return false;
  const q=Math.floor(d.getMonth()/3)+1;
  return q===trim;
}
function trimestreDeMes(mes){return Math.floor(mes/3)+1;}

// Selector de periodo reutilizable (mes + año)
function periodoSelector(onChangeFn){
  let mesOpts='<option value="-1">Todo el año</option>';
  MESES.forEach((m,i)=>{mesOpts+=`<option value="${i}" ${i===filtroMes?'selected':''}>${m}</option>`;});
  const anios=[];
  const ahora=new Date().getFullYear();
  for(let a=ahora;a>=ahora-3;a--)anios.push(a);
  let anioOpts=anios.map(a=>`<option value="${a}" ${a===filtroAnio?'selected':''}>${a}</option>`).join('');
  return `<div style="display:flex;gap:10px;margin-bottom:20px;">
    <select class="fselect" style="flex:2;" onchange="filtroMes=Number(this.value);${onChangeFn}">${mesOpts}</select>
    <select class="fselect" style="flex:1;" onchange="filtroAnio=Number(this.value);${onChangeFn}">${anioOpts}</select>
  </div>`;
}

// Exportar a CSV
function exportarCSV(filename,rows){
  const csv=rows.map(r=>r.map(cell=>{
    const s=String(cell==null?'':cell);
    return s.includes(',')||s.includes('"')||s.includes('\n')?'"'+s.replace(/"/g,'""')+'"':s;
  }).join(',')).join('\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=filename;a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

async function renderResumen(c){
  c.innerHTML='<div class="loader">Cargando datos...</div>';
  const{data:trabajos}=await sb.from('trabajos').select('*');
  const{data:gastos}=await sb.from('gastos').select('*');
  const{data:facturas}=await sb.from('facturas').select('*');
  const T=trabajos||[],G=gastos||[],F=facturas||[];

  // Filtrar por periodo seleccionado
  const Tp=T.filter(t=>enPeriodo(t.fecha_trabajo,filtroAnio,filtroMes));
  const Gp=G.filter(g=>enPeriodo(g.fecha_gasto,filtroAnio,filtroMes));

  const adminIds2=allTatuadoras.filter(x=>x.rol==='admin').map(x=>x.id);
  const facturadoTotal=Tp.reduce((s,t)=>s+Number(t.total_trabajo),0);
  // El 30% de cesión solo se aplica a las tatuadoras, NO a la dueña
  const ingresoEstudio=Tp.filter(t=>!adminIds2.includes(t.tatuadora_id)).reduce((s,t)=>s+Number(t.porcentaje_estudio),0);
  // Los ingresos propios de Alba (sus tatuajes, al 100%)
  const ingresosPropios=Tp.filter(t=>adminIds2.includes(t.tatuadora_id)).reduce((s,t)=>s+Number(t.total_trabajo),0);
  const gastosTotal=Gp.reduce((s,g)=>s+Number(g.importe),0);
  const beneficio=ingresoEstudio+ingresosPropios-gastosTotal;
  const pendienteCobro=Tp.reduce((s,t)=>s+Number(t.pendiente_cobro||0),0);
  const sinValidar=Tp.filter(t=>t.validado==='pendiente').length;

  // IVA del trimestre actual (lo que tiene que declarar)
  const trim=filtroMes>=0?trimestreDeMes(filtroMes):trimestreDeMes(new Date().getMonth());
  const factTrim=F.filter(f=>enTrimestre(f.fecha_factura,filtroAnio,trim));
  const ivaRepercutido=factTrim.reduce((s,f)=>s+Number(f.importe_iva),0);
  const gastosTrim=G.filter(g=>g.tiene_iva&&enTrimestre(g.fecha_gasto,filtroAnio,trim));
  const ivaSoportado=gastosTrim.reduce((s,g)=>s+Number(g.importe_iva||0),0);
  const ivaAPagar=ivaRepercutido-ivaSoportado;

  const periodoLabel=filtroMes>=0?`${MESES[filtroMes]} ${filtroAnio}`:`Año ${filtroAnio}`;

  // Por tatuadora
  const porTat={};
  const adminIds=allTatuadoras.filter(x=>x.rol==='admin').map(x=>x.id);
  Tp.forEach(t=>{
    // Excluir trabajos de la dueña: ella no se cobra el 30% a sí misma
    if(adminIds.includes(t.tatuadora_id))return;
    if(!porTat[t.tatuadora_id])porTat[t.tatuadora_id]={total:0,estudio:0,n:0};
    porTat[t.tatuadora_id].total+=Number(t.total_trabajo);
    porTat[t.tatuadora_id].estudio+=Number(t.porcentaje_estudio);
    porTat[t.tatuadora_id].n++;
  });
  let tatRows='';
  Object.entries(porTat).sort((a,b)=>b[1].estudio-a[1].estudio).forEach(([id,d])=>{
    const tat=allTatuadoras.find(x=>x.id===id);
    tatRows+=`<div class="wrow" onclick="switchPage('trabajos')"><div class="wrow-top"><span class="wrow-client">${tat?tat.nombre_completo:'?'}</span><span class="ttag">${d.n} trabajos</span></div><div class="wrow-nums"><div class="wnum"><span class="k">Facturado</span><span class="v">${eur(d.total)}</span></div><div class="wnum"><span class="k">Tu 30%</span><span class="v accent">${eur(d.estudio)}</span></div></div></div>`;
  });
  if(!tatRows)tatRows='<div class="empty"><div class="empty-mark">Sin actividad</div><div class="empty-sub">No hay trabajos en este periodo.</div></div>';

  // ===== MOVIMIENTOS (libro de caja) =====
  // Ingresos: 30% de tatuadoras + 100% de trabajos de Alba. Gastos: negativos.
  const movs=[];
  Tp.forEach(t=>{
    const esDeAlba=adminIds2.includes(t.tatuadora_id);
    if(esDeAlba){
      movs.push({fecha:t.fecha_trabajo,concepto:'Tatuaje propio · '+t.cliente_nombre,importe:Number(t.total_trabajo),tipo:'ingreso'});
    }else{
      const tat=allTatuadoras.find(x=>x.id===t.tatuadora_id);
      movs.push({fecha:t.fecha_trabajo,concepto:'30% '+(tat?tat.nombre_completo.split(' ')[0]:'')+' · '+t.cliente_nombre,importe:Number(t.porcentaje_estudio),tipo:'ingreso'});
    }
  });
  Gp.forEach(g=>{
    movs.push({fecha:g.fecha_gasto,concepto:g.concepto,importe:-Number(g.importe),tipo:'gasto'});
  });
  // Ordenar por fecha descendente
  movs.sort((a,b)=>new Date(b.fecha)-new Date(a.fecha));
  const totalMovs=movs.reduce((s,m)=>s+m.importe,0);

  let movRows='';
  movs.forEach(m=>{
    const pos=m.importe>=0;
    movRows+=`<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 16px;background:var(--coal);border:1px solid var(--line);border-radius:3px;margin-bottom:6px;">
      <div style="min-width:0;flex:1;">
        <div style="font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${m.concepto}</div>
        <div style="font-size:10px;color:var(--ash2);margin-top:3px;">${fecha(m.fecha)}</div>
      </div>
      <div style="font-family:'Jost',sans-serif;font-weight:600;font-size:15px;white-space:nowrap;color:${pos?'var(--green)':'var(--rose)'};">${pos?'+':''}${eur(m.importe)}</div>
    </div>`;
  });
  let movimientosHtml;
  if(!movs.length){
    movimientosHtml='<div class="empty"><div class="empty-mark">Sin movimientos</div><div class="empty-sub">No hay ingresos ni gastos en este periodo.</div></div>';
  }else{
    movimientosHtml=`
      <div class="scard" style="margin-bottom:14px;border-color:${totalMovs>=0?'var(--green)':'var(--rose)'};">
        <div class="lbl">Diferencia (ingresos − gastos)</div>
        <div class="val" style="font-size:30px;color:${totalMovs>=0?'var(--green)':'var(--rose)'};">${totalMovs>=0?'+':''}${eur(totalMovs)}</div>
      </div>
      <div>${movRows}</div>`;
  }

  // Mini gráfica de evolución (últimos 6 meses del año)
  const adminIdsG=allTatuadoras.filter(x=>x.rol==='admin').map(x=>x.id);
  const evolucion=[];
  for(let m=0;m<12;m++){
    const tm=T.filter(t=>enPeriodo(t.fecha_trabajo,filtroAnio,m));
    const gm=G.filter(g=>enPeriodo(g.fecha_gasto,filtroAnio,m));
    // Beneficio del mes = 30% de tatuadoras + tatuajes propios de Alba - gastos
    const ing30=tm.filter(t=>!adminIdsG.includes(t.tatuadora_id)).reduce((s,t)=>s+Number(t.porcentaje_estudio),0);
    const ingPropios=tm.filter(t=>adminIdsG.includes(t.tatuadora_id)).reduce((s,t)=>s+Number(t.total_trabajo),0);
    const gas=gm.reduce((s,g)=>s+Number(g.importe),0);
    evolucion.push({mes:m,valor:ing30+ingPropios-gas});
  }
  // La escala usa el valor absoluto máximo para que las barras se vean proporcionadas
  const maxEvol=Math.max(...evolucion.map(e=>Math.abs(e.valor)),1);
  let barras=evolucion.map(e=>{
    const h=Math.max((Math.abs(e.valor)/maxEvol)*100,2);
    const activo=e.mes===filtroMes;
    const negativo=e.valor<0;
    const color=activo?'var(--rose)':(negativo?'rgba(255,0,75,0.25)':'var(--smoke)');
    return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;" onclick="filtroMes=${e.mes};switchPage('resumen')" title="${MESES[e.mes]}: ${eur(e.valor)}">
      <div style="width:100%;display:flex;align-items:flex-end;height:80px;">
        <div style="width:100%;height:${h}%;background:${color};border-radius:2px 2px 0 0;transition:all 0.3s;${negativo?'border-bottom:2px solid var(--rose);':''}"></div>
      </div>
      <span style="font-size:8px;color:${activo?'var(--rose)':'var(--ash2)'};letter-spacing:0.05em;">${MESES_CORTO[e.mes]}</span>
    </div>`;
  }).join('');

  c.innerHTML=`
    <div class="shead"><div class="shead-l"><div class="eyebrow">${periodoLabel}</div><h1>Resumen</h1></div></div>
    ${periodoSelector("switchPage('resumen')")}
    <div class="scard feature" style="margin-bottom:12px;border-color:${beneficio>=0?'var(--green)':'var(--rose)'};background:linear-gradient(135deg,var(--coal),${beneficio>=0?'rgba(61,220,132,0.06)':'rgba(255,0,75,0.06)'});">
      <div class="lbl">Beneficio neto del periodo</div>
      <div class="val" style="font-size:38px;color:${beneficio>=0?'var(--green)':'var(--rose)'};">${eur(beneficio)}</div>
      <div class="sub">tu 30% + tus tatuajes − gastos</div>
    </div>
    <div class="stats" style="grid-template-columns:repeat(3,1fr);">
      <div class="scard"><div class="lbl">Tu 30%</div><div class="val accent" style="font-size:22px;">${eur(ingresoEstudio)}</div><div class="sub">cesión</div></div>
      <div class="scard"><div class="lbl">Tus tatuajes</div><div class="val" style="font-size:22px;">${eur(ingresosPropios)}</div><div class="sub">al 100%</div></div>
      <div class="scard"><div class="lbl">Gastos</div><div class="val" style="font-size:22px;">${eur(gastosTotal)}</div><div class="sub">del periodo</div></div>
    </div>

    <div style="background:var(--coal);border:1px solid var(--line);border-radius:4px;padding:20px;margin-bottom:28px;">
      <div style="font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ash2);margin-bottom:16px;font-weight:500;">Evolución del beneficio neto · ${filtroAnio}</div>
      <div style="display:flex;gap:4px;align-items:flex-end;">${barras}</div>
    </div>

    <div class="stats" style="grid-template-columns:1fr 1fr;">
      <div class="scard"><div class="lbl">Pendiente de cobro</div><div class="val">${eur(pendienteCobro)}</div><div class="sub">señales/totales sin saldar</div></div>
      <div class="scard"><div class="lbl">Sin validar</div><div class="val">${sinValidar}</div><div class="sub">trabajos por revisar</div></div>
    </div>

    <div style="background:linear-gradient(135deg,var(--coal),rgba(255,0,75,0.05));border:1px solid var(--rose);border-radius:4px;padding:20px;margin-bottom:28px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
        <div style="font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--rose);font-weight:600;">IVA · Trimestre ${trim} de ${filtroAnio}</div>
      </div>
      <div style="display:flex;gap:24px;flex-wrap:wrap;">
        <div><div class="k" style="font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ash2);margin-bottom:4px;">IVA repercutido</div><div style="font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;">${eur(ivaRepercutido)}</div></div>
        <div><div class="k" style="font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ash2);margin-bottom:4px;">IVA soportado</div><div style="font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;">${eur(ivaSoportado)}</div></div>
        <div><div class="k" style="font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--rose);margin-bottom:4px;">A liquidar (modelo 303)</div><div style="font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--rose);">${eur(ivaAPagar)}</div></div>
      </div>
    </div>

    <div class="shead" style="margin-bottom:16px;"><div class="shead-l"><h1 style="font-size:26px;">Por tatuadora</h1></div><button class="btn ghost sm" onclick="exportarResumen()">Exportar CSV</button></div>
    <div class="wlist">${tatRows}</div>

    <div class="shead" style="margin:32px 0 16px;"><div class="shead-l"><div class="eyebrow">Libro de caja</div><h1 style="font-size:26px;">Movimientos</h1></div></div>
    ${movimientosHtml}
  `;
}

async function exportarResumen(){
  const{data:trabajos}=await sb.from('trabajos').select('*');
  const T=(trabajos||[]).filter(t=>enPeriodo(t.fecha_trabajo,filtroAnio,filtroMes));
  const rows=[['Fecha','Tatuadora','Cliente','Total','Señal','Cobrado hoy','Pendiente','30% Estudio','70% Tatuadora','Método','Validado']];
  T.forEach(t=>{
    const tat=allTatuadoras.find(x=>x.id===t.tatuadora_id);
    rows.push([fecha(t.fecha_trabajo),tat?tat.nombre_completo:'',t.cliente_nombre,t.total_trabajo,t.senal_previa,t.cobrado_hoy,t.pendiente_cobro,t.porcentaje_estudio,t.porcentaje_tatuadora,t.metodo_pago,t.validado]);
  });
  const periodo=filtroMes>=0?`${MESES[filtroMes]}_${filtroAnio}`:`${filtroAnio}`;
  exportarCSV(`Davink_Resumen_${periodo}.csv`,rows);
  showToast('CSV descargado');
}

function calcReparto(){
  const repartoBox=document.getElementById('reparto_box');
  // Si hay selector de tatuadora, comprobar si la elegida es admin (Alba = ingreso propio, sin reparto)
  const tatSel=document.getElementById('t_tatuadora');
  if(tatSel&&repartoBox){
    const elegida=allTatuadoras.find(x=>x.id===tatSel.value);
    if(elegida&&elegida.rol==='admin'){repartoBox.style.display='none';}
    else{repartoBox.style.display='';}
  }
  const tatEl=document.getElementById('calc_tat');
  const estEl=document.getElementById('calc_est');
  if(!tatEl||!estEl)return;
  const total=Number(document.getElementById('t_total').value)||0;
  tatEl.textContent=eur(total*0.7);
  estEl.textContent=eur(total*0.3);
}

async function guardarTrabajo(){
  const cliente=document.getElementById('t_cliente').value.trim();
  const telefono=document.getElementById('t_tel').value.trim();
  const total=Number(document.getElementById('t_total').value)||0;
  if(!cliente){showToast('Pon el nombre del cliente','err');return;}
  if(!telefono){showToast('Añade el teléfono del cliente','err');return;}
  if(total<=0){showToast('Pon el total del trabajo','err');return;}
  // Si hay selector (admin/recepción), usar la tatuadora elegida; si no, el usuario actual
  const tatSel=document.getElementById('t_tatuadora');
  const tatuadoraId=tatSel?tatSel.value:currentUser.id;
  const payload={
    tatuadora_id:tatuadoraId,
    cliente_nombre:cliente,
    cliente_telefono:telefono,
    total_trabajo:total,
    senal_previa:Number(document.getElementById('t_senal').value)||0,
    cobrado_hoy:Number(document.getElementById('t_cobrado').value)||0,
    metodo_pago:document.getElementById('t_metodo').value,
    fecha_trabajo:document.getElementById('t_fecha').value
  };
  const{error}=await sb.from('trabajos').insert(payload);
  if(error){showToast('Error al guardar','err');return;}
  closeSheet();showToast('Trabajo registrado');
  switchPage(currentPage);
}

}

async function calcularBaseCesion(){
  const tatId=document.getElementById('f_tatuadora').value;
  const mes=Number(document.getElementById('f_mes').value);
  const anio=Number(document.getElementById('f_anio_fact').value);
  const{data:trabajos}=await sb.from('trabajos').select('*').eq('tatuadora_id',tatId);
  const delMes=(trabajos||[]).filter(t=>{const d=new Date(t.fecha_trabajo);return d.getMonth()===mes&&d.getFullYear()===anio;});
  const base=delMes.reduce((s,t)=>s+Number(t.porcentaje_estudio),0);
  document.getElementById('f_base').value=base.toFixed(2);
  calcFacturaTotal();
  showToast(`${delMes.length} trabajos · base ${eur(base)}`);
}

function calcFacturaTotal(){
  const base=Number(document.getElementById('f_base').value)||0;
  const iva=base*0.21;
  document.getElementById('f_iva_calc').textContent=eur(iva);
  document.getElementById('f_total_calc').textContent=eur(base+iva);
}

async function guardarFactura(){
  const tipo=document.getElementById('f_tipo').value;
  const base=Number(document.getElementById('f_base').value)||0;
  if(base<=0){showToast('Pon la base imponible','err');return;}
  const concepto=document.getElementById('f_concepto').value.trim();
  const iva=Math.round(base*0.21*100)/100;
  const total=Math.round((base+iva)*100)/100;
  const anioActual=new Date().getFullYear();

  // Datos receptor
  let receptor={nombre:'',nif:'',direccion:'',cp:'',ciudad:''};
  let tatId=null,mesF=null,anioF=null;
  if(tipo==='cesion'){
    tatId=document.getElementById('f_tatuadora').value;
    const tat=allTatuadoras.find(x=>x.id===tatId);
    if(!tat){showToast('Selecciona tatuadora','err');return;}
    receptor={nombre:tat.nombre_completo,nif:tat.nif||'',direccion:tat.direccion||'',cp:tat.codigo_postal||'',ciudad:tat.ciudad||''};
    mesF=Number(document.getElementById('f_mes').value);
    anioF=Number(document.getElementById('f_anio_fact').value);
  }else{
    receptor={nombre:currentProfile.nombre_completo,nif:currentProfile.nif||'',direccion:currentProfile.direccion||'',cp:currentProfile.codigo_postal||'',ciudad:currentProfile.ciudad||''};
  }

  // Obtener número correlativo seguro
  const{data:num,error:numErr}=await sb.rpc('siguiente_numero_factura',{p_anio:anioActual});
  if(numErr){showToast('Error generando número','err');return;}

  // Fecha = último día del mes facturado (o actual)
  let fechaFactura;
  if(tipo==='cesion'){fechaFactura=new Date(anioF,mesF+1,0).toISOString().split('T')[0];}
  else{const n=new Date();fechaFactura=new Date(n.getFullYear(),n.getMonth()+1,0).toISOString().split('T')[0];}

  const payload={
    numero:num,anio:anioActual,tipo,
    receptor_nombre:receptor.nombre,receptor_nif:receptor.nif,receptor_direccion:receptor.direccion,receptor_cp:receptor.cp,receptor_ciudad:receptor.ciudad,
    tatuadora_id:tatId,mes_facturado:mesF,anio_facturado:anioF,
    concepto,base_imponible:base,tipo_iva:21,importe_iva:iva,total,fecha_factura:fechaFactura
  };
  const{data:saved,error}=await sb.from('facturas').insert(payload).select().single();
  if(error){showToast('Error al guardar factura','err');return;}
  closeSheet();showToast(`Factura ${num}/${anioActual} generada`);
  generarPDFFactura(saved);
  switchPage('facturas');
}

function generarPDFFactura(f){
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const emisor={nombre:currentProfile.nombre_completo,nif:currentProfile.nif||'',direccion:currentProfile.direccion||'',cp:currentProfile.codigo_postal||'',ciudad:currentProfile.ciudad||''};
  let y=24;
  doc.setFont('helvetica','bold');doc.setFontSize(13);
  doc.text((emisor.nombre||'').toUpperCase(),20,y);y+=6;
  doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(60);
  if(emisor.direccion){doc.text(emisor.direccion,20,y);y+=5;}
  if(emisor.cp||emisor.ciudad){doc.text(`${emisor.cp||''} ${emisor.ciudad||''}`.trim(),20,y);y+=5;}
  if(emisor.nif){doc.text('NIF: '+emisor.nif,20,y);y+=5;}
  y+=8;
  doc.setTextColor(0);doc.setFont('helvetica','bold');doc.setFontSize(11);
  doc.text(`FACTURA Nº: ${f.numero}/${f.anio}`,20,y);y+=6;
  doc.text(`FECHA: ${fecha(f.fecha_factura)}`,20,y);y+=12;
  doc.setFont('helvetica','bold');doc.setFontSize(10);doc.text('Cliente:',20,y);y+=5;
  doc.setFont('helvetica','normal');
  doc.text(f.receptor_nombre,20,y);y+=5;
  if(f.receptor_direccion){doc.text(f.receptor_direccion,20,y);y+=5;}
  if(f.receptor_cp||f.receptor_ciudad){doc.text(`${f.receptor_cp||''} ${f.receptor_ciudad||''}`.trim(),20,y);y+=5;}
  if(f.receptor_nif){doc.text('NIF: '+f.receptor_nif,20,y);y+=5;}
  y+=12;
  // Tabla
  const x1=20,x2=130,w=170;
  doc.setFillColor(220);doc.rect(x1,y,w,9,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(10);
  doc.text('CONCEPTO',x1+3,y+6);doc.text('IMPORTE (€)',x2+3,y+6);y+=9;
  doc.setFont('helvetica','normal');
  doc.rect(x1,y,w,9);doc.text(f.concepto,x1+3,y+6);doc.text(eur(f.base_imponible).replace(' €',' €'),x2+3,y+6);y+=9;
  doc.rect(x1,y,w,9);doc.text(`IVA (${f.tipo_iva}%)`,x1+3,y+6);doc.text(eur(f.importe_iva),x2+3,y+6);y+=9;
  doc.setFont('helvetica','bold');doc.rect(x1,y,w,9);doc.text('TOTAL',x1+3,y+6);doc.text(eur(f.total),x2+3,y+6);y+=9;
  doc.save(`Factura_${f.numero}-${f.anio}_${f.receptor_nombre.replace(/ /g,'_')}.pdf`);
}

function calcGastoIva(){
  const tiene=document.getElementById('g_tiene_iva').value==='si';
  const info=document.getElementById('g_iva_info');
  info.classList.toggle('hidden',!tiene);
  if(tiene){
    const total=Number(document.getElementById('g_importe').value)||0;
    const base=total/1.21;
    const iva=total-base;
    document.getElementById('g_base_calc').textContent=eur(base);
    document.getElementById('g_iva_calc').textContent=eur(iva);
  }
}

async function guardarGasto(){
  const concepto=document.getElementById('g_concepto').value.trim();
  const importe=Number(document.getElementById('g_importe').value)||0;
  if(!concepto||importe<=0){showToast('Completa concepto e importe','err');return;}
  const tieneIva=document.getElementById('g_tiene_iva').value==='si';
  let base=null,iva=null;
  if(tieneIva){base=Math.round((importe/1.21)*100)/100;iva=Math.round((importe-base)*100)/100;}
  const{error}=await sb.from('gastos').insert({concepto,importe,categoria:document.getElementById('g_categoria').value,fecha_gasto:document.getElementById('g_fecha').value,notas:document.getElementById('g_notas').value.trim()||null,tiene_iva:tieneIva,base_imponible:base,importe_iva:iva});
  if(error){showToast('Error','err');return;}
  closeSheet();showToast('Gasto añadido');switchPage('gastos');
}

async function abrirGasto(id){
  const{data:g}=await sb.from('gastos').select('*').eq('id',id).single();
  if(!g)return;
  openSheet(`
    <div class="sheet-head"><h2>${g.concepto}</h2><button class="sheet-close" onclick="closeSheet()">×</button></div>
    <div class="sheet-body">
      <div class="calc-box"><span class="k">Importe</span><div class="v accent" style="font-size:28px;">${eur(g.importe)}</div></div>
      <div class="fgroup"><label class="flabel">Categoría</label><div>${g.categoria}</div></div>
      <div class="fgroup"><label class="flabel">Fecha</label><div>${fecha(g.fecha_gasto)}</div></div>
      ${g.notas?`<div class="fgroup"><label class="flabel">Notas</label><div>${g.notas}</div></div>`:''}
      <button class="btn ghost" style="width:100%;justify-content:center;margin-top:8px;" onclick="borrarGasto('${id}')">Eliminar gasto</button>
    </div>
  `);
}

async function borrarGasto(id){
  if(!confirm('¿Eliminar este gasto?'))return;
  await sb.from('gastos').delete().eq('id',id);
  closeSheet();showToast('Gasto eliminado');switchPage('gastos');
}

// ============ EQUIPO (admin) ============
async function renderEquipo(c){
  await loadTatuadoras();
  let rows='';
  for(const t of allTatuadoras){
    const rolBadge=t.rol==='admin'?'<span class="ttag" style="background:var(--rose);color:#fff;">Admin</span>':'<span class="ttag">Tatuadora</span>';
    const inactiva=t.activo===false?'<span class="ttag" style="background:var(--smoke);color:var(--ash2);">Inactiva</span>':'';
    rows+=`<div class="wrow" onclick="abrirPerfil('${t.id}')" style="${t.activo===false?'opacity:0.5;':''}"><div class="wrow-top"><span class="wrow-client">${t.nombre_completo}</span><div style="display:flex;gap:6px;">${inactiva}${rolBadge}</div></div><div class="wrow-nums"><div class="wnum"><span class="k">NIF</span><span class="v" style="font-size:13px;">${t.nif||'Sin datos'}</span></div><div class="wnum"><span class="k">Ciudad</span><span class="v" style="font-size:13px;">${t.ciudad||'—'}</span></div></div></div>`;
  }
  c.innerHTML=`
    <div class="shead"><div class="shead-l"><div class="eyebrow">Gestión del estudio</div><h1>Equipo</h1></div><div class="shead-r">${allTatuadoras.length}<br>personas</div></div>
    <div class="muted" style="font-size:13px;margin-bottom:16px;line-height:1.5;">Las tatuadoras se registran ellas mismas desde la pantalla de acceso. Aquí puedes editar sus datos fiscales y rol.</div>
    <div class="wlist">${rows}</div>
  `;
}

async function abrirPerfil(id){
  const t=allTatuadoras.find(x=>x.id===id);
  if(!t)return;
  openSheet(`
    <div class="sheet-head"><h2>${t.nombre_completo}</h2><button class="sheet-close" onclick="closeSheet()">×</button></div>
    <div class="sheet-body">
      <div class="fgroup"><label class="flabel">Nombre completo</label><input class="finput" id="p_nombre" value="${t.nombre_completo||''}"></div>
      <div class="fgroup"><label class="flabel">NIF</label><input class="finput" id="p_nif" value="${t.nif||''}"></div>
      <div class="fgroup"><label class="flabel">Dirección</label><input class="finput" id="p_dir" value="${t.direccion||''}"></div>
      <div class="frow">
        <div class="fgroup"><label class="flabel">Código postal</label><input class="finput" id="p_cp" value="${t.codigo_postal||''}"></div>
        <div class="fgroup"><label class="flabel">Ciudad</label><input class="finput" id="p_ciudad" value="${t.ciudad||''}"></div>
      </div>
      <div class="fgroup"><label class="flabel">Teléfono</label><input class="finput" id="p_tel" value="${t.telefono||''}"></div>
      ${isAdmin?`<div class="fgroup"><label class="flabel">Rol</label><select class="fselect" id="p_rol"><option value="tatuadora" ${t.rol==='tatuadora'?'selected':''}>Tatuadora</option><option value="recepcion" ${t.rol==='recepcion'?'selected':''}>Recepción</option><option value="admin" ${t.rol==='admin'?'selected':''}>Admin</option></select></div>`:`<div class="fgroup"><label class="flabel">Rol</label><div style="font-weight:600;text-transform:capitalize;">${t.rol}</div><input type="hidden" id="p_rol" value="${t.rol}"></div>`}
      <div class="fgroup"><label class="flabel">Estado</label>
        <div class="vctrl">
          <button class="vbtn ${t.activo?'active val':''}" onclick="setActivoTat('${id}',true)">Activa</button>
          <button class="vbtn ${!t.activo?'active pen':''}" onclick="setActivoTat('${id}',false)">Inactiva</button>
        </div>
        <div style="font-size:11px;color:var(--ash2);margin-top:8px;line-height:1.5;">Una tatuadora inactiva no puede entrar ni aparece en facturas nuevas, pero se conserva su histórico contable.</div>
      </div>
      <button class="btn accent" style="width:100%;justify-content:center;" onclick="guardarPerfil('${id}')">Guardar cambios</button>
      <button class="btn ghost" style="width:100%;justify-content:center;margin-top:10px;" onclick="intentarBorrarTat('${id}')">Eliminar tatuadora</button>
    </div>
  `);
}

async function guardarPerfil(id){
  const payload={
    nombre_completo:document.getElementById('p_nombre').value.trim(),
    nif:document.getElementById('p_nif').value.trim()||null,
    direccion:document.getElementById('p_dir').value.trim()||null,
    codigo_postal:document.getElementById('p_cp').value.trim()||null,
    ciudad:document.getElementById('p_ciudad').value.trim()||null,
    telefono:document.getElementById('p_tel').value.trim()||null,
    rol:document.getElementById('p_rol').value
  };
  const{error}=await sb.from('perfiles').update(payload).eq('id',id);
  if(error){showToast('Error al guardar','err');return;}
  closeSheet();showToast('Perfil actualizado');await loadTatuadoras();switchPage('equipo');
}
async function setActivoTat(id,activo){
  const{error}=await sb.from('perfiles').update({activo}).eq('id',id);
  if(error){showToast('Error','err');return;}
  showToast(activo?'Tatuadora activada':'Tatuadora desactivada');
  await loadTatuadoras();abrirPerfil(id);
}
async function intentarBorrarTat(id){
  // No permitir borrarse a uno mismo
  if(id===currentUser.id){showToast('No puedes eliminar tu propia cuenta','err');return;}
  // Comprobar si tiene trabajos
  const{data:trabajos}=await sb.from('trabajos').select('id').eq('tatuadora_id',id).limit(1);
  if(trabajos&&trabajos.length>0){
    alert('Esta tatuadora tiene trabajos registrados. Por motivos contables y legales no se puede borrar (Hacienda exige conservar el histórico). En su lugar, márcala como Inactiva para que no pueda entrar pero se conserve su histórico.');
    return;
  }
  if(!confirm('¿Eliminar esta tatuadora? No tiene trabajos registrados, así que se borrará por completo.'))return;
  const{error}=await sb.from('perfiles').delete().eq('id',id);
  if(error){showToast('Error al eliminar: '+error.message,'err');return;}
  closeSheet();
  showToast('Tatuadora eliminada');
  await loadTatuadoras();
  switchPage('equipo');
}

    <div class="muted" style="font-size:13px;margin-bottom:20px;line-height:1.5;">Estos datos se usan para generar tus facturas de cesión. Mantenlos actualizados.</div>
    <div class="fgroup"><label class="flabel">Nombre completo</label><input class="finput" id="mp_nombre" value="${t.nombre_completo||''}"></div>
    <div class="fgroup"><label class="flabel">NIF</label><input class="finput" id="mp_nif" value="${t.nif||''}"></div>
    <div class="fgroup"><label class="flabel">Dirección</label><input class="finput" id="mp_dir" value="${t.direccion||''}"></div>
    <div class="frow">
      <div class="fgroup"><label class="flabel">Código postal</label><input class="finput" id="mp_cp" value="${t.codigo_postal||''}"></div>
      <div class="fgroup"><label class="flabel">Ciudad</label><input class="finput" id="mp_ciudad" value="${t.ciudad||''}"></div>
    </div>
    <div class="fgroup"><label class="flabel">Teléfono</label><input class="finput" id="mp_tel" value="${t.telefono||''}"></div>

async function guardarMiPerfil(){
  const payload={
    nombre_completo:document.getElementById('mp_nombre').value.trim(),
    nif:document.getElementById('mp_nif').value.trim()||null,
    direccion:document.getElementById('mp_dir').value.trim()||null,
    codigo_postal:document.getElementById('mp_cp').value.trim()||null,
    ciudad:document.getElementById('mp_ciudad').value.trim()||null,
    telefono:document.getElementById('mp_tel').value.trim()||null
  };
  const{error}=await sb.from('perfiles').update(payload).eq('id',currentUser.id);
  if(error){showToast('Error al guardar','err');return;}
  currentProfile={...currentProfile,...payload};
  showToast('Datos guardados');
}
